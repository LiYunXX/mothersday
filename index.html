<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>💜母亲节快乐 - 一封给你的信</title>
    <!-- 微信 Open Graph 标签 -->
    <meta property="og:title" content="💌 母亲节快乐 - 轻触拆开" />
    <meta property="og:description" content="妈妈，有一封信等你查收~" />
    <!-- 替换为你的信封封面图 -->
    <meta
      property="og:image"
      content="https://liyunxx.github.io/mothersday/images/cover.jpg"
    />
    <!-- 替换为部署后的真实网址 -->
    <meta
      property="og:url"
      content="https://liyunxx.github.io/mothersday/index.html"
    />
    <meta property="og:type" content="article" />
    <!-- 微信专属（也可以用同样的） -->
    <meta itemprop="name" content="💌 母亲节快乐 - 轻触拆开" />
    <meta itemprop="description" content="妈妈，有一封信等你查收~" />
    <meta
      itemprop="image"
      content="https://liyunxx.github.io/mothersday/images/cover.jpg"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* ========== 引入艺术字体 ========== */
      @font-face {
        font-family: "ArtFont";
        /* 使用了一款免费可商用的手写体，如果你有其他艺术字，替换下面 url */
        src: url("https://raw.githubusercontent.com/izayal/fonts/main/ZCOOL_KuaiLe/ZCOOLKuaiLe-Regular.ttf")
          format("truetype");
        font-weight: normal;
        font-style: normal;
      }

      body {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        font-family: "ArtFont", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: #f3e5f5; /* 浅紫底色 */
      }

      /* ========== 页面容器 ========== */
      .page {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        transition: opacity 0.8s ease;
      }
      .hidden {
        opacity: 0;
        pointer-events: none;
        z-index: 1;
      }
      .active {
        opacity: 1;
        pointer-events: auto;
        z-index: 10;
      }

      /* ========== 封面页（信封页） ========== */
      .cover-page {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #e1bee7, #ce93d8); /* 浅紫渐变 */

        cursor: pointer;
      }
      /* ========== CSS 信封 ========== */
      .cover-envelope-wrapper {
        position: relative;
        width: 200px;
        height: 110px;
        animation: float 2s ease-in-out infinite;
        cursor: pointer;
      }

      /* 信封身体 */
      .envelope-body {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 110px;
        background: linear-gradient(145deg, #d1c4e9, #b39ddb);
        position: relative;
        overflow: hidden; /* 保证折痕不超出圆角 */
        border-radius: 8px;
        box-shadow:
          0 10px 20px rgba(74, 20, 140, 0.4),
          inset 0 2px 4px rgba(255, 255, 255, 0.3);
        z-index: 2;
      }

      /* 信封身体 - 左边高光折痕 */
      .envelope-body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 6px; /* 折痕宽度，比原来宽 */
        height: 100%;
        background: linear-gradient(
          to right,
          rgba(255, 255, 255, 0.7),
          rgba(255, 255, 255, 0.1)
        );
        border-radius: 8px 0 0 8px; /* 圆角跟信封一致 */
        z-index: 5; /* 放在上层 */
      }

      /* 右边暗面折痕 */
      .envelope-body::after {
        content: "";
        position: absolute;
        top: 0;
        right: 0;
        width: 6px;
        height: 100%;
        background: linear-gradient(
          to left,
          rgba(0, 0, 0, 0.2),
          rgba(0, 0, 0, 0.05)
        );
        border-radius: 0 8px 8px 0;
        z-index: 5;
      }

      /* 封盖（三角形） */
      .envelope-flap {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 80px;
        z-index: 3;
        transform-origin: top center;
        transition: transform 0.6s ease;
      }

      .flap-top {
        width: 100%;
        height: 100%;
        background: linear-gradient(180deg, #c7b2e4, #b39ddb);
        clip-path: polygon(0 0, 50% 100%, 100% 0);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      }

      /* 封盖打开状态- */
      .cover-envelope-wrapper.opened .envelope-flap {
        transform: rotateX(180deg);
      }

      /* 信封上的爱心封印 */
      .seal {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 36px;
        height: 36px;
        background: #e57373;
        border-radius: 50%;
        z-index: 4;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        color: white;
      }
      .seal::after {
        content: "❤";
      }
      .cover-tip {
        margin-top: 20px;
        font-size: 22px;
        color: #4a148c;
        letter-spacing: 6px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-15px);
        }
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.6;
          transform: scale(0.95);
        }
      }

      /* ========== 祝福页 ========== */
      .blessing-page {
        background: #f3e5f5; /* 极浅紫，上面覆盖照片轮播 */
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      /* 照片轮播背景 */
      .photo-slideshow {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        background: #e1bee7; /* 浅紫底色，防止加载前白屏 */
      }
      /* 增加一个模糊背景层，自动匹配当前图片 */
      .photo-slideshow .blur-bg {
        position: absolute;
        top: -20px;
        left: -20px;
        width: calc(100% + 40px);
        height: calc(100% + 40px);
        background-size: cover;
        background-position: center;
        filter: blur(20px) brightness(0.6);
        opacity: 0.8;
        transition: background-image 2s ease;
        z-index: 0;
      }
      /* 主图：完整显示，居中 */
      .photo-slideshow img {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: contain; /* 关键修改：完整显示图片 */
        z-index: 1;
        opacity: 0;
        transition: opacity 2s ease;
      }

      .photo-slideshow img.active-photo {
        opacity: 1;
      }

      /* 信纸内容区 */
      .letter-container {
        position: relative;
        z-index: 2;
        margin-top: 50px;
        width: 85%;
        max-width: 400px;
        max-height: 70vh; /* 限制最高为屏幕高度的70% */
        overflow-y: auto; /* 内容超出时显示滚动条 */
        -webkit-overflow-scrolling: touch; /* iOS顺滑滚动 */
        background: rgba(238, 214, 255, 0.2);
        backdrop-filter: blur(10px);
        border-radius: 24px;
        padding: 35px 25px;
        box-shadow: 0 20px 40px rgba(74, 20, 140, 0.25);
        text-align: center;
        animation: fadeInUp 1s ease forwards;
        transform: translateY(30px);
        opacity: 0;
      }
      .letter-container.show {
        animation: fadeInUp 1s ease forwards;
      }
      @keyframes fadeInUp {
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .letter-container h1 {
        font-size: 32px;
        color: #6a1b9a;
        margin-bottom: 24px;
        letter-spacing: 4px;
      }
      .letter-content {
        font-size: 20px;
        color: #000000;
        line-height: 2.2;
        letter-spacing: 2px;
        white-space: pre-line;
      }
      .letter-signature {
        margin-top: 30px;
        font-size: 18px;
        color: #9e0000;
      }

      /* 音乐按钮 */
      .music-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        z-index: 20;
        width: 44px;
        height: 44px;
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(6px);
        border-radius: 50%;
        border: none;
        font-size: 24px;
        display: none; /* 初始隐藏，信封打开后显示 */
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }
      .music-btn.show {
        display: flex;
      }

      /* 爱心飘落 */
      .heart {
        position: absolute;
        z-index: 3;
        pointer-events: none;
        animation: fall linear forwards;
      }
      @keyframes fall {
        0% {
          transform: translateY(-10vh) rotate(0deg) scale(0.4);
          opacity: 1;
        }
        100% {
          transform: translateY(110vh) rotate(720deg) scale(1);
          opacity: 0;
        }
      }
      /* 看照片按钮 */
      .photo-mode-btn {
        position: absolute;
        top: 80px; /* 在音乐按钮下方一点 */
        right: 20px;
        z-index: 20;
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(8px);
        border: none;
        border-radius: 20px;
        padding: 8px 16px;
        font-size: 16px;
        color: #6a1b9a;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        display: none; /* 和音乐按钮一起显示 */
        align-items: center;
        gap: 4px;
        cursor: pointer;
      }
      .photo-mode-btn.show {
        display: flex;
      }

      /* 全屏照片查看器 */
      .photo-viewer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #1a1a2e; /* 深色背景，让照片突出 */
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
      }
      .photo-viewer.hidden {
        display: none;
      }
      .photo-viewer-slide {
        width: 100%;
        height: 80%;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        transition: background-image 0.4s ease;
      }
      .photo-viewer-dots {
        display: flex;
        gap: 8px;
        margin: 16px 0;
      }
      .photo-viewer-dots span {
        width: 8px;
        height: 8px;
        background: rgba(255, 255, 255, 0.4);
        border-radius: 50%;
      }
      .photo-viewer-dots span.active {
        background: #ffffff;
      }
      .photo-back-btn {
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: white;
        font-size: 16px;
        padding: 8px 24px;
        border-radius: 20px;
        cursor: pointer;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <!-- ========== 封面页 ========== -->
    <div class="page active cover-page" id="coverPage">
      <div class="cover-envelope-wrapper" id="envelopeBox">
        <div class="envelope-flap">
          <div class="flap-top"></div>
        </div>
        <div class="envelope-body">
          <div class="seal"></div>
        </div>
      </div>
      <div class="cover-tip">轻 触 拆 开</div>
    </div>
    <!-- ========== 祝福页 ========== -->
    <div class="page hidden blessing-page" id="blessingPage">
      <!-- 照片轮播背景 -->
      <div class="photo-slideshow" id="photoSlideshow">
        <!-- 照片会自动由JS生成，避免这里写死 -->
      </div>

      <!-- 信纸 -->
      <div class="letter-container" id="letterBox">
        <h1>🌷母亲节快乐🌷</h1>
        <div class="letter-content">
          <!-- /* ===== 把下面文字换成你想对妈妈说的话 ===== */ -->
          亲爱的妈妈，<br />
          谢谢你做我生命里的光。<br />
          每一次回家都有热饭，<br />
          每一次远行都有牵挂。<br />
          愿你眼角永远带笑，<br />
          愿岁月对你温柔以待。<br />
          我永远爱你。
        </div>
        <div class="letter-signature">
          —— 你的小棉袄/小夹克
          <!-- /* ===== 改这里署名 ===== */ -->
        </div>
      </div>

      <!-- 音乐按钮 -->
      <button class="music-btn" id="musicBtn" onclick="toggleMusic()">
        🎵
      </button>
      <!-- 音乐按钮下面，添加这个“看照片”按钮 -->
      <button
        class="photo-mode-btn"
        id="photoModeBtn"
        onclick="enterPhotoMode()"
      >
        📷 欣赏照片
      </button>

      <!-- 全屏照片查看器，放在祝福页最底部 -->
      <div class="photo-viewer hidden" id="photoViewer">
        <div class="photo-viewer-slide" id="photoSlide"></div>
        <div class="photo-viewer-dots" id="photoDots"></div>
        <button class="photo-back-btn" onclick="exitPhotoMode()">✕ 返回</button>
      </div>
      <!-- 背景音乐 -->
      <audio id="bgMusic" loop preload="auto">
        <!-- /* ===== 替换为你的音乐链接 ===== */ -->
        <source src="https://你的音乐链接.mp3" type="audio/mpeg" />
        您的浏览器不支持音频播放。
      </audio>
    </div>

    <script>
      // ========== 照片列表（替换为你的照片链接） ==========
      const PHOTOS = [
        "https://bu.dusays.com/2026/05/10/69ff7a6732810.jpg",
        "https://bu.dusays.com/2026/05/10/69ff7a6cd30dd.jpg",
        "https://bu.dusays.com/2026/05/10/69ff7a737008c.jpg",
        "https://bu.dusays.com/2026/05/10/69ff7a7448405.jpg",
        "https://bu.dusays.com/2026/05/10/69ff7a7536497.jpg",
        "https://bu.dusays.com/2026/05/10/69ff7a77e5f5d.jpg",
        "https://bu.dusays.com/2026/05/10/69ff7a7857e1a.jpg",
        "https://bu.dusays.com/2026/05/10/69ff7a79a5f08.jpg",
        "https://bu.dusays.com/2026/05/10/69ff7a79c8da8.jpg",
        "https://bu.dusays.com/2026/05/10/69ff7a7fe2ef2.jpg",
        "https://bu.dusays.com/2026/05/10/69ff7a80036c2.jpg",
      ];

      // 生成轮播图
      const slideshow = document.getElementById("photoSlideshow");
      let currentPhotoIndex = 0;
      // 先创建模糊背景层
      const blurBg = document.createElement("div");
      blurBg.className = "blur-bg";
      slideshow.appendChild(blurBg);

      PHOTOS.forEach((src, idx) => {
        const img = document.createElement("img");
        img.src = src;
        img.alt = "合照";
        if (idx === 0) {
          img.classList.add("active-photo");
          blurBg.style.backgroundImage = `url(${src})`; // 初始背景
        }
        slideshow.appendChild(img);
      });

      // 照片轮播
      let photoInterval;
      function startPhotoSlideshow() {
        const images = slideshow.querySelectorAll("img");
        if (images.length === 0) return;

        // 先把初始背景设好（防止第一张没背景）
        if (PHOTOS.length > 0) {
          blurBg.style.backgroundImage = `url(${PHOTOS[0]})`;
        }

        photoInterval = setInterval(() => {
          images[currentPhotoIndex].classList.remove("active-photo");
          currentPhotoIndex = (currentPhotoIndex + 1) % images.length;
          images[currentPhotoIndex].classList.add("active-photo");

          // 同步更新模糊背景
          blurBg.style.backgroundImage = `url(${PHOTOS[currentPhotoIndex]})`;
        }, 4000);
      }

      // ========== 打开信封 ==========
      function openBlessing() {
        // 切换到祝福页
        document.getElementById("coverPage").classList.remove("active");
        document.getElementById("coverPage").classList.add("hidden");
        document.getElementById("blessingPage").classList.remove("hidden");
        document.getElementById("blessingPage").classList.add("active");

        // 信纸动画延迟一点出现
        setTimeout(() => {
          document.getElementById("letterBox").classList.add("show");
          document.getElementById("musicBtn").classList.add("show");
        }, 300);

        // 启动照片轮播
        startPhotoSlideshow();
        // 启动爱心飘落
        startHearts();
      }

      // 音乐控制
      const bgMusic = document.getElementById("bgMusic");
      function toggleMusic() {
        if (bgMusic.paused) {
          bgMusic.play().catch((e) => console.log("播放需要用户交互"));
          document.getElementById("musicBtn").textContent = "🎵";
        } else {
          bgMusic.pause();
          document.getElementById("musicBtn").textContent = "🔇";
        }
      }
      // 封面点击时尝试触发一次音乐（由于自动播放限制，实际需要用户再点按钮）
      // 我们让音乐按钮第一次显示时引导用户点击

      // 爱心飘落
      function startHearts() {
        const container = document.getElementById("blessingPage");
        const emojis = ["❤️", "💕", "💗", "🌸", "✨"];
        setInterval(() => {
          const heart = document.createElement("span");
          heart.className = "heart";
          heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          heart.style.left = Math.random() * 95 + "%";
          heart.style.animationDuration = Math.random() * 4 + 3 + "s";
          heart.style.fontSize = Math.random() * 24 + 14 + "px";
          container.appendChild(heart);
          heart.addEventListener("animationend", () => heart.remove());
        }, 600);
      }
      // 信封点击打开动画
      document
        .getElementById("envelopeBox")
        .addEventListener("click", function () {
          // 先播放翻盖动画
          this.classList.add("opened");
          // 动画结束后切换到祝福页
          setTimeout(() => {
            openBlessing();
          }, 600); // 和CSS过渡时间一致
        });
      // 进入纯照片浏览模式
      function enterPhotoMode() {
        document.getElementById("photoViewer").classList.remove("hidden");
        // 同步当前照片索引
        updatePhotoViewer();
        // 暂停背景轮播，防止冲突
        clearInterval(photoInterval);
        photoInterval = null;
      }

      // 退出照片浏览
      function exitPhotoMode() {
        document.getElementById("photoViewer").classList.add("hidden");
        // 重新开始轮播
        if (!photoInterval) {
          startPhotoSlideshow();
        }
      }

      // 更新全屏查看器里的照片和导航点
      function updatePhotoViewer() {
        const slide = document.getElementById("photoSlide");
        const dotsContainer = document.getElementById("photoDots");
        const total = PHOTOS.length;
        if (total === 0) return;

        // 设置当前照片
        slide.style.backgroundImage = `url(${PHOTOS[currentPhotoIndex]})`;
        // 生成指示点
        dotsContainer.innerHTML = "";
        for (let i = 0; i < total; i++) {
          const dot = document.createElement("span");
          if (i === currentPhotoIndex) dot.classList.add("active");
          dot.addEventListener("click", () => {
            currentPhotoIndex = i;
            updatePhotoViewer();
          });
          dotsContainer.appendChild(dot);
        }

        // 左右滑动支持（触摸）
        let touchStartX = 0;
        slide.addEventListener("touchstart", (e) => {
          touchStartX = e.touches[0].clientX;
        });
        slide.addEventListener("touchend", (e) => {
          const delta = e.changedTouches[0].clientX - touchStartX;
          if (Math.abs(delta) > 50) {
            if (delta > 0) {
              // 向右滑，上一张
              currentPhotoIndex = (currentPhotoIndex - 1 + total) % total;
            } else {
              // 向左滑，下一张
              currentPhotoIndex = (currentPhotoIndex + 1) % total;
            }
            updatePhotoViewer();
          }
        });
      }

      // 还需要让“看照片按钮”和音乐按钮一起显示，修改 openBlessing 里的 setTimeout：
      // 找到 openBlessing 函数里的 setTimeout，里面原来只有 letterBox 和 musicBtn，加上 photoModeBtn
      // 改成这样：
      setTimeout(() => {
        document.getElementById("letterBox").classList.add("show");
        document.getElementById("musicBtn").classList.add("show");
        document.getElementById("photoModeBtn").classList.add("show"); // ← 新增这一行
      }, 300);
    </script>
  </body>
</html>
